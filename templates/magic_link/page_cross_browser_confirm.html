<!doctype html>
<html lang="{{ locale_code }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="color-scheme" content="light dark">
    <title>OxiCloud</title>
    <link rel="icon" type="image/svg+xml" href="/logo/logo-plain.svg">
    <script src="/js/core/theme-init.js"></script>
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/views/auth.css">
    <style>
      /* Cross-browser prompt is the one magic-link page that needs a
         "warning" callout that auth.css doesn't ship. Inline because the
         shape is unique to this surface — keep the styling local rather
         than adding tokens that no other page reuses. */
      .magic-note {
        background: var(--color-warning-bg-light);
        border-left: 3px solid var(--color-warning-text-amber);
        color: var(--color-text);
        padding: 0.75em 1em;
        margin: 1.5em 0;
        border-radius: 8px;
        font-size: 0.95em;
        text-align: left;
      }
    </style>
  </head>
  <body>
    <div class="auth-container">
      <div class="auth-panel">
        <div class="auth-logo">
          <div class="auth-logo-icon">
            <svg viewBox="0 0 500 500">
              <path d="M345 310c32 0 58-26 58-58s-26-58-58-58c-6.2 0-12 0.9-17.5 2.7C318 166 289 143 255 143c-34.3 0-63.1 22.6-73 53.7C176.9 195.7 171 195 165 195c-32 0-58 26-58 58s26 58 58 58h180z" fill="#fff"/>
            </svg>
          </div>
          <div class="auth-logo-text">OxiCloud</div>
        </div>
        <h2 class="auth-title">{{ title }}</h2>
        <p class="auth-subtitle">{{ body }}</p>
        <p class="magic-note">{{ warning }}</p>
        <a class="auth-button" href="{{ confirm_url }}" role="button">{{ continue_label }}</a>
      </div>
    </div>
  </body>
</html>
